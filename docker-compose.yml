services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: cadris
      POSTGRES_USER: cadris
      POSTGRES_PASSWORD: cadris_dev
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  control-plane:
    build: ./apps/control-plane
    ports:
      - "8000:8000"
    environment:
      CONTROL_PLANE_DATABASE_URL: postgresql://cadris:cadris_dev@postgres:5432/cadris
      CONTROL_PLANE_RUNTIME_URL: http://runtime:8001
      CONTROL_PLANE_RENDERER_URL: http://renderer:8002
      CONTROL_PLANE_ALLOWED_ORIGINS: http://localhost:3000,http://127.0.0.1:3000
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      CONTROL_PLANE_S3_BUCKET: ${CONTROL_PLANE_S3_BUCKET:-}
    depends_on:
      - postgres
      - runtime
      - renderer

  runtime:
    build:
      context: .
      dockerfile: apps/runtime/Dockerfile
    ports:
      - "8001:8001"
    environment:
      CADRIS_RUNTIME_PROVIDER: ${CADRIS_RUNTIME_PROVIDER:-local}
      CADRIS_OPENAI_MODEL: ${CADRIS_OPENAI_MODEL:-gpt-4o}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}

  renderer:
    build: ./apps/renderer
    ports:
      - "8002:8002"

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_CADRIS_API_URL: http://control-plane:8000
    depends_on:
      - control-plane

volumes:
  pgdata:
