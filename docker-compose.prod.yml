# Production deployment with Caddy reverse proxy + HTTPS
# Usage: docker compose -f docker-compose.prod.yml up -d
# Requires: .env.prod file with all secrets

services:
  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deploy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      web:
        condition: service_healthy
      control-plane:
        condition: service_healthy

  control-plane:
    build: ./apps/control-plane
    restart: unless-stopped
    environment:
      CONTROL_PLANE_DATABASE_URL: ${CONTROL_PLANE_DATABASE_URL}
      CONTROL_PLANE_RUNTIME_URL: http://runtime:8001
      CONTROL_PLANE_RENDERER_URL: http://renderer:8002
      CONTROL_PLANE_ALLOWED_ORIGINS: ${CONTROL_PLANE_ALLOWED_ORIGINS:-https://app.cadris.fr}
      CONTROL_PLANE_TRUSTED_PROXY_SECRET: ${CONTROL_PLANE_TRUSTED_PROXY_SECRET}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      CONTROL_PLANE_S3_BUCKET: ${CONTROL_PLANE_S3_BUCKET:-}
      CONTROL_PLANE_S3_ENDPOINT: ${CONTROL_PLANE_S3_ENDPOINT:-}
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY:-}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET:-}
      STRIPE_PRICE_STARTER: ${STRIPE_PRICE_STARTER:-}
      STRIPE_PRICE_PRO: ${STRIPE_PRICE_PRO:-}
      STRIPE_PRICE_EXPERT: ${STRIPE_PRICE_EXPERT:-}
      FRONTEND_URL: ${FRONTEND_URL:-https://app.cadris.fr}
      RESEND_API_KEY: ${RESEND_API_KEY:-}
    depends_on:
      runtime:
        condition: service_healthy
      renderer:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 512M

  runtime:
    build:
      context: .
      dockerfile: apps/runtime/Dockerfile
    restart: unless-stopped
    environment:
      CADRIS_RUNTIME_PROVIDER: ${CADRIS_RUNTIME_PROVIDER:-collaborative}
      CADRIS_MODEL_PROFILE: ${CADRIS_MODEL_PROFILE:-prod}
      CADRIS_OPENAI_MODEL: ${CADRIS_OPENAI_MODEL:-gpt-4.1}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      TOGETHER_API_KEY: ${TOGETHER_API_KEY:-}
      PERPLEXITY_API_KEY: ${PERPLEXITY_API_KEY:-}
      CADRIS_RUNTIME_STATE_DB_URL: ${CONTROL_PLANE_DATABASE_URL:-}
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8001/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 512M

  renderer:
    build: ./apps/renderer
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8002/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 256M

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    restart: unless-stopped
    environment:
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET}
      NEXTAUTH_URL: ${NEXTAUTH_URL:-https://app.cadris.fr}
      CONTROL_PLANE_URL: http://control-plane:8000
      NEXT_PUBLIC_CADRIS_API_URL: ${NEXT_PUBLIC_CADRIS_API_URL:-https://app.cadris.fr}
      CONTROL_PLANE_TRUSTED_PROXY_SECRET: ${CONTROL_PLANE_TRUSTED_PROXY_SECRET}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      GITHUB_CLIENT_ID: ${GITHUB_CLIENT_ID:-}
      GITHUB_CLIENT_SECRET: ${GITHUB_CLIENT_SECRET:-}
      RESEND_API_KEY: ${RESEND_API_KEY:-}
    depends_on:
      control-plane:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 512M
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:3000').then(r => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3

volumes:
  caddy_data:
  caddy_config:
