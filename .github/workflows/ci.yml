name: CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Install ruff
        run: pip install ruff
      - name: Lint Python (control-plane)
        run: ruff check apps/control-plane/
      - name: Lint Python (runtime)
        run: ruff check apps/runtime/
      - name: Lint Python (renderer)
        run: ruff check apps/renderer/

  lint-web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install deps
        run: npm ci
      - name: Lint & typecheck
        working-directory: apps/web
        run: npm run lint

  test-runtime:
    runs-on: ubuntu-latest
    needs: [lint-python]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Install runtime deps
        working-directory: apps/runtime
        run: pip install . pytest
      - name: Run runtime tests
        working-directory: apps/runtime
        run: python -m pytest tests/ -v

  test-control-plane:
    runs-on: ubuntu-latest
    needs: [lint-python]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Install control-plane deps
        working-directory: apps/control-plane
        run: pip install ".[test]"
      - name: Run control-plane tests
        working-directory: apps/control-plane
        run: python -m pytest tests/ -v

  test-renderer:
    runs-on: ubuntu-latest
    needs: [lint-python]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Install renderer deps
        working-directory: apps/renderer
        run: pip install ".[test]"
      - name: Run renderer tests
        working-directory: apps/renderer
        run: python -m pytest tests/ -v

  test-web:
    runs-on: ubuntu-latest
    needs: [lint-web]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install deps
        run: npm ci
      - name: Run web tests
        working-directory: apps/web
        run: npm test

  build-web:
    runs-on: ubuntu-latest
    needs: [lint-web]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install deps
        run: npm ci
      - name: Build web
        working-directory: apps/web
        run: npm run build

  security-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run Trivy filesystem scan
        uses: aquasecurity/trivy-action@0.28.0
        with:
          scan-type: fs
          scan-ref: .
          severity: CRITICAL,HIGH
          exit-code: 1

  docker-build:
    runs-on: ubuntu-latest
    needs: [test-runtime, test-control-plane, test-renderer, build-web, security-scan]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    strategy:
      matrix:
        include:
          - service: control-plane
            context: ./apps/control-plane
            dockerfile: apps/control-plane/Dockerfile
          - service: renderer
            context: ./apps/renderer
            dockerfile: apps/renderer/Dockerfile
          - service: runtime
            context: .
            dockerfile: apps/runtime/Dockerfile
          - service: web
            context: .
            dockerfile: apps/web/Dockerfile
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: true
          tags: ghcr.io/${{ github.repository }}/cadris-${{ matrix.service }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
